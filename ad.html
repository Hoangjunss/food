<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Quận 1 Foodie – Chatbot Gemini & Groq</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Inter', sans-serif; }
  h1, h2, h3, .logo-font { font-family: 'Playfair Display', serif; }
  body {
    background: #fefaf2;
    background-image: radial-gradient(circle at 10% 30%, rgba(255,225,200,0.3) 2%, transparent 2.5%);
    background-size: 28px 28px;
  }
  .card-hover { transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
  .card-hover:hover { transform: translateY(-8px); box-shadow: 0 25px 35px -12px rgba(0,0,0,0.2); }
  .badge {
    border-radius: 9999px; font-size: 0.7rem; font-weight: 600;
    padding: 0.25rem 0.85rem; display: inline-flex; align-items: center; gap: 6px;
    backdrop-filter: blur(2px);
  }
  .tag-chay { background: #dcfce7; color: #166534; border-left: 3px solid #22c55e; }
  .tag-halal { background: #ffedd5; color: #9a3412; border-left: 3px solid #f97316; }
  .tag-au { background: #dbeafe; color: #1e3a8a; border-left: 3px solid #3b82f6; }
  .tag-a { background: #ffe4e6; color: #9f1239; border-left: 3px solid #f43f5e; }
  .tag-dacsan { background: #fef3c7; color: #854d0e; border-left: 3px solid #eab308; }
  .tag-cafe { background: #f3f4f6; color: #374151; border-left: 3px solid #6b7280; }
  .nav-link { position: relative; padding-bottom: 4px; transition: color 0.2s; cursor: pointer; }
  .nav-link.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 2.5px; background: #E76F51; border-radius: 3px; }
  .hero-pattern { background: linear-gradient(125deg, #2A9D8F 0%, #E9C46A 100%); position: relative; overflow: hidden; }
  .hero-pattern::before { content: "🍜 🍲 🥘 🍛 🍣 🥗 🍝"; position: absolute; bottom: -25px; right: -20px; font-size: 150px; opacity: 0.12; white-space: nowrap; pointer-events: none; transform: rotate(-5deg); }
  .card-img { transition: transform 0.5s ease; object-fit: cover; width: 100%; height: 190px; }
  .card:hover .card-img { transform: scale(1.02); }
  .filter-btn { transition: all 0.2s; cursor: pointer; }
  .page { display: none; }
  .page.active { display: block; }
  
  /* Chat widget chung */
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; background: #fefaf5; }
  .chat-input-area { display: flex; padding: 12px; border-top: 1px solid #eee; background: white; gap: 8px; }
  .chat-input-area input { flex: 1; border: 1px solid #e2e8f0; border-radius: 40px; padding: 10px 16px; outline: none; transition: 0.2s; }
  .chat-input-area input:focus { border-color: #E76F51; box-shadow: 0 0 0 2px rgba(231,111,81,0.2); }
  .chat-input-area button { background: #E76F51; border: none; border-radius: 40px; padding: 0 24px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
  .chat-input-area button:hover { background: #d45a3a; }
  .message { max-width: 85%; padding: 10px 16px; border-radius: 20px; font-size: 0.9rem; line-height: 1.4; }
  .user { background: #264653; color: white; align-self: flex-end; border-bottom-right-radius: 6px; }
  .bot { background: #e9ecef; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 6px; }
  .typing { font-style: italic; color: #6c757d; background: #f1f3f5; border-radius: 20px; padding: 10px 16px; }
  
  /* Widget Gemini (phải) */
  .chat-widget-gemini { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
  .chat-toggle-gemini { background: #E76F51; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.2); transition: 0.2s; }
  .chat-toggle-gemini:hover { background: #d45a3a; transform: scale(1.05); }
  .chat-window-gemini { position: fixed; bottom: 96px; right: 24px; width: 380px; max-width: calc(100vw - 48px); height: 520px; background: white; border-radius: 28px; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.25); display: flex; flex-direction: column; overflow: hidden; transition: 0.2s; z-index: 10000; }
  .chat-header-gemini { background: #264653; color: white; padding: 14px 18px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
  
  /* Widget Groq (trái) */
  .chat-widget-groq { position: fixed; bottom: 24px; left: 24px; z-index: 9999; }
  .chat-toggle-groq { background: #f97316; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.2); transition: 0.2s; }
  .chat-toggle-groq:hover { background: #ea580c; transform: scale(1.05); }
  .chat-window-groq { position: fixed; bottom: 96px; left: 24px; width: 380px; max-width: calc(100vw - 48px); height: 520px; background: white; border-radius: 28px; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.25); display: flex; flex-direction: column; overflow: hidden; transition: 0.2s; z-index: 10000; }
  .chat-header-groq { background: #1e293b; color: white; padding: 14px 18px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
  
  @media (max-width:640px) {
    .chat-window-gemini { width: 300px; height: 480px; right: 12px; bottom: 84px; }
    .chat-window-groq { width: 300px; height: 480px; left: 12px; bottom: 84px; }
  }
</style>
</head>
<body>
  <img src="https://picsum.photos/id/200/400/280" alt="">
</body>
</html>
